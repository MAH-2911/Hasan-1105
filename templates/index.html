<!DOCTYPE html>
<html>
<head>
    <title>Cloud Kitchen</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input, select {
            margin: 5px;
            padding: 5px;
        }
        .ingredient-row {
            margin-bottom: 5px;
        }
        button {
            padding: 5px 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h1>Cloud Kitchen Dashboard</h1>

<!-- ================= INGREDIENT SECTION ================= -->
<h2>Add Ingredient</h2>
<input id="ingredientName" placeholder="Ingredient Name">
<button onclick="addIngredient()">Add Ingredient</button>

<hr>

<!-- ================= DISH SECTION ================= -->
<h2>Add Dish</h2>

<input id="name" placeholder="Dish Name">
<input id="prep" type="number" placeholder="Preparation Cost">
<input id="profit" type="number" placeholder="Profit Margin">

<h3>Ingredients for this Dish</h3>
<div id="ingredient-list"></div>

<button onclick="addIngredientField()">+ Add Ingredient</button>
<br><br>
<button onclick="submitDish()">Add Dish</button>

<hr>

<!-- ================= MENU ================= -->
<h2>Menu</h2>
<ul id="menu"></ul>

<script>
let ingredientsData = [];


// ================= LOAD INGREDIENTS =================
async function loadIngredients() {
    const res = await fetch("/ingredients");
    ingredientsData = await res.json();
}


// ================= ADD INGREDIENT FIELD =================
function addIngredientField() {
    let div = document.createElement("div");
    div.className = "ingredient-row";

    div.innerHTML = `
        <select class="ing-id">
            ${ingredientsData.map(i => `<option value="${i.id}">${i.name}</option>`).join("")}
        </select>
        <input type="number" class="qty" placeholder="Qty">
        <input type="number" class="price" placeholder="Price">
        <button onclick="this.parentElement.remove()">❌</button>
    `;

    document.getElementById("ingredient-list").appendChild(div);
}


// ================= ADD INGREDIENT =================
async function addIngredient() {
    const name = document.getElementById("ingredientName").value;

    if (!name) {
        alert("Enter ingredient name");
        return;
    }

    await fetch("/ingredients", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name})
    });

    document.getElementById("ingredientName").value = "";

    await loadIngredients();
    alert("Ingredient Added!");
}


// ================= SUBMIT DISH =================
async function submitDish() {
    let ingredients = [];

    document.querySelectorAll("#ingredient-list .ingredient-row").forEach(div => {
        ingredients.push({
            id: div.querySelector(".ing-id").value,
            qty: div.querySelector(".qty").value || 1,
            price: div.querySelector(".price").value || 0
        });
    });

    const name = document.getElementById("name").value;
    const prep = document.getElementById("prep").value;
    const profit = document.getElementById("profit").value;

    if (!name) {
        alert("Enter dish name");
        return;
    }

    await fetch("/dishes", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name,
            prep: prep || 0,
            profit: profit || 75,
            ingredients: ingredients
        })
    });

    alert("Dish Added!");

    // Clear fields
    document.getElementById("name").value = "";
    document.getElementById("prep").value = "";
    document.getElementById("profit").value = "";
    document.getElementById("ingredient-list").innerHTML = "";

    loadMenu();
}


// ================= LOAD MENU =================
async function loadMenu() {
    const res = await fetch("/dishes");
    const data = await res.json();

    let html = "";

    data.forEach(d => {
        html += `
        <li>
            <b>${d.name}</b>  
            | Cost: ₹${d.ingredient_cost}  
            | Prep: ₹${d.preparation_expense}  
            | Selling: ₹${d.selling_price}
            <button onclick="deleteDish(${d.id})">Delete</button>
        </li>`;
    });

    document.getElementById("menu").innerHTML = html;
}


// ================= DELETE DISH =================
async function deleteDish(id) {
    await fetch("/dishes/" + id, {method: "DELETE"});
    loadMenu();
}


// ================= INIT =================
async function init() {
    await loadIngredients();
    loadMenu();
}

init();
</script>

</body>
</html>
